<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexTrack Admin Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --bg: #f4f6f9; --card: #ffffff; --text: #172b4d; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 1.5rem; }
        .admin-card { max-width: 800px; margin: 0 auto; background: var(--card); padding: 1.5rem; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #091e42; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
        input, select { width: 100%; padding: 0.7rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media(min-width: 600px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        .btn { padding: 0.8rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; width: 100%; font-size: 0.95rem; background: var(--primary); color: #fff; }
        .status-msg { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; display: none; }
        .msg-success { background: #e3fcef; color: #006644; }
        .msg-error { background: #ffebe6; color: #bf2600; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2><i class="fa-solid fa-user-gear"></i> ApexTrack Control Console</h2>
        
        <!-- TOKEN ENTRY -->
        <div class="form-group" style="background: #eae6ff; padding: 1rem; border-radius: 6px;">
            <label style="color: #403294;"><i class="fa-solid fa-key"></i> Personal Access Token</label>
            <input type="password" id="ghToken" placeholder="Paste ghp_... token here">
        </div>

        <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--border);">

        <h2>Shipment Details & Override</h2>
        
        <div class="grid-2">
            <div class="form-group">
                <label>Tracking ID / Waybill No.</label>
                <input type="text" id="trackId" placeholder="e.g. ATG-10001">
            </div>
            <div class="form-group">
                <label>Current Status</label>
                <select id="trackStatus">
                    <option value="In Transit" selected>In Transit</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option>
                    <option value="On Hold">On Hold (Exception)</option>
                    <option value="Delayed">Delayed (Exception)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Status Description / Notice (Optional)</label>
            <input type="text" id="statusNote" placeholder="e.g. Package clearing customs inspection hub.">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Sender Details</label>
                <input type="text" id="senderName" placeholder="e.g. John Miller (Lagos)">
            </div>
            <div class="form-group">
                <label>Recipient Details</label>
                <input type="text" id="recipientName" placeholder="e.g. Sarah Williams (London)">
            </div>
            <div class="form-group">
                <label>Origin City</label>
                <input type="text" id="originCity" placeholder="e.g. Lagos, Nigeria">
            </div>
            <div class="form-group">
                <label>Destination City</label>
                <input type="text" id="destinationCity" placeholder="e.g. London, UK">
            </div>
            <div class="form-group">
                <label>Package Weight</label>
                <input type="text" id="pkgWeight" placeholder="e.g. 14.5 kg">
            </div>
            <div class="form-group">
                <label>Expected Delivery Date</label>
                <input type="text" id="eddDate" placeholder="e.g. August 12, 2026">
            </div>
        </div>

        <h2 style="margin-top: 1rem;">Social & Contact Override</h2>
        <div class="grid-2">
            <div class="form-group">
                <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Contact Number (Optional)</label>
                <input type="text" id="waNumber" placeholder="e.g. 2348012345678 (Leave blank to hide button)">
            </div>
            <div class="form-group">
                <label><i class="fa-brands fa-instagram"></i> Instagram Username (Optional)</label>
                <input type="text" id="igHandle" placeholder="e.g. apextrack_global (Leave blank to hide button)">
            </div>
        </div>

        <button type="button" onclick="saveShipmentData()" class="btn"><i class="fa-solid fa-floppy-disk"></i> Save & Publish Changes Live</button>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script>
        document.getElementById('ghToken').value = localStorage.getItem('apex_gh_token') || '';

        async function saveShipmentData() {
            const token = document.getElementById('ghToken').value.trim();
            const trackId = document.getElementById('trackId').value.trim().toUpperCase();
            const msgBox = document.getElementById('statusMessage');

            if (!token || !trackId) {
                alert("Please enter both your Access Token and a Tracking ID.");
                return;
            }

            localStorage.setItem('apex_gh_token', token);
            msgBox.style.display = 'block';
            msgBox.className = 'status-msg';
            msgBox.textContent = "Updating Repository...";

            try {
                const owner = "Flight113";
                const repo = "consignment-tracker"; 
                const filePath = "index.html";

                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                const getRes = await fetch(getUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!getRes.ok) throw new Error("Could not fetch index.html.");

                const fileData = await getRes.json();
                let fileContent = decodeURIComponent(escape(atob(fileData.content)));

                const newShipmentObject = `
            "${trackId}": {
                sender: "${document.getElementById('senderName').value}",
                recipient: "${document.getElementById('recipientName').value}",
                status: "${document.getElementById('trackStatus').value}",
                statusNote: "${document.getElementById('statusNote').value}",
                edd: "${document.getElementById('eddDate').value}",
                origin: "${document.getElementById('originCity').value}",
                destination: "${document.getElementById('destinationCity').value}",
                weight: "${document.getElementById('pkgWeight').value}",
                whatsapp: "${document.getElementById('waNumber').value}",
                instagram: "${document.getElementById('igHandle').value}"
            },`;

                fileContent = fileContent.replace(/const\s+mockDatabase\s*=\s*\{/, `const mockDatabase = {${newShipmentObject}`);
                const updatedContentEncoded = btoa(unescape(encodeURIComponent(fileContent)));

                const putRes = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Admin Update: Tracking ID ${trackId}`,
                        content: updatedContentEncoded,
                        sha: fileData.sha
                    })
                });

                if (putRes.ok) {
                    msgBox.className = 'status-msg msg-success';
                    msgBox.textContent = `Success! Tracking ID ${trackId} updated live.`;
                } else {
                    const errData = await putRes.json();
                    throw new Error(errData.message || "Failed to save changes.");
                }

            } catch (err) {
                msgBox.className = 'status-msg msg-error';
                msgBox.textContent = err.message;
            }
        }
    </script>
</body>
</html>
